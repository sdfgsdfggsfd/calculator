<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="format-detection" content="telephone=no">
<title>Surebet Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ═══════════════════════════════════════════
     DESIGN TOKENS
  ═══════════════════════════════════════════ */
  :root {
    --bg:          #060b16;
    --surface:     #0b1324;
    --surface2:    #0f1b30;
    --surface3:    #14213a;
    --border:      #1a2d46;
    --border-soft: #112035;
    --text:        #cdd9ef;
    --text2:       #4d6882;
    --text3:       #283a50;
    --cyan:        #22d3ee;
    --cyan-dim:    rgba(34,211,238,.09);
    --cyan-glow:   rgba(34,211,238,.18);
    --green:       #10b981;
    --green-bright:#34d399;
    --green-bg:    rgba(16,185,129,.07);
    --green-border:rgba(16,185,129,.22);
    --green-glow:  rgba(16,185,129,.25);
    --red:         #f43f5e;
    --red-bg:      rgba(244,63,94,.07);
    --red-border:  rgba(244,63,94,.22);
    --red-glow:    rgba(244,63,94,.2);
    --amber:       #f59e0b;
    --amber-bg:    rgba(245,158,11,.08);
    --amber-border:rgba(245,158,11,.28);
    --poly:        #a78bfa;
    --poly-bg:     rgba(167,139,250,.07);
    --poly-border: rgba(167,139,250,.18);
    --poly-glow:   rgba(167,139,250,.15);
    --fix:         #fb923c;
    --fix-bg:      rgba(251,146,60,.08);
    --fix-border:  rgba(251,146,60,.28);
    --lay:         #f472b6;
    --lay-bg:      rgba(244,114,182,.08);
    --lay-border:  rgba(244,114,182,.28);
    --lay-glow:    rgba(244,114,182,.15);
    --tfoot-bg:    #07101e;
    --inp-ro:      rgba(255,255,255,.04);
    --row-hover:   rgba(255,255,255,.018);
    --r:    10px;
    --r-sm: 6px;
    --r-xs: 4px;
  }

  .light {
    --bg:           #edf1fa;
    --surface:      #ffffff;
    --surface2:     #e2ecf8;
    --surface3:     #d5e4f5;
    --border:       #bfd0e8;
    --border-soft:  #cdddf2;
    --text:         #0c1929;
    --text2:        #3d5e80;
    --text3:        #7a9ab8;
    --cyan:         #0891b2;
    --cyan-dim:     rgba(8,145,178,.08);
    --cyan-glow:    rgba(8,145,178,.15);
    --green:        #059669;
    --green-bright: #0d9f72;
    --green-bg:     rgba(5,150,105,.07);
    --green-border: rgba(5,150,105,.25);
    --green-glow:   rgba(5,150,105,.18);
    --red:          #dc2250;
    --red-bg:       rgba(220,34,80,.06);
    --red-border:   rgba(220,34,80,.22);
    --red-glow:     rgba(220,34,80,.15);
    --amber-bg:     rgba(217,119,6,.08);
    --amber-border: rgba(217,119,6,.3);
    --poly:         #6d28d9;
    --poly-bg:      rgba(109,40,217,.07);
    --poly-border:  rgba(109,40,217,.2);
    --lay:          #db2777;
    --lay-bg:       rgba(219,39,119,.07);
    --lay-border:   rgba(219,39,119,.25);
    --fix-bg:       rgba(234,88,12,.07);
    --fix-border:   rgba(234,88,12,.28);
    --tfoot-bg:     #d8e8f8;
    --inp-ro:       rgba(0,0,0,.04);
    --row-hover:    rgba(79,70,229,.03);
  }

  body {
    font-family: var(--sans,'DM Sans',sans-serif);
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    padding: 22px 14px 56px;
    line-height: 1.5;
    transition: background .28s, color .28s;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 65% 45% at 95%  0%, rgba(34,211,238,.055) 0%, transparent 55%),
      radial-gradient(ellipse 55% 50% at  0% 100%, rgba(167,139,250,.04) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }
  .wrap { max-width: 1280px; margin: 0 auto; position: relative; z-index: 1; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .wrap > * { animation: fadeUp .4s cubic-bezier(.22,1,.36,1) both; }
  .wrap > *:nth-child(1) { animation-delay: .00s; }
  .wrap > *:nth-child(2) { animation-delay: .06s; }
  .wrap > *:nth-child(3) { animation-delay: .10s; }
  .wrap > *:nth-child(4) { animation-delay: .14s; }
  .wrap > *:nth-child(5) { animation-delay: .18s; }

  /* ─── HEADER ─── */
  .hdr {
    display: flex; align-items: flex-start;
    justify-content: space-between; flex-wrap: wrap;
    gap: 14px; margin-bottom: 20px;
  }
  .hdr-brand { display: flex; flex-direction: column; gap: 4px; }
  .hdr-brand h1 {
    font-family: 'Syne', sans-serif; font-size: 30px;
    font-weight: 800; letter-spacing: -1.5px; line-height: 1; color: var(--text);
  }
  .hdr-brand h1 em { font-style: normal; color: var(--cyan); }
  .hdr-brand .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; color: var(--text3); letter-spacing: .14em; text-transform: uppercase;
  }
  .hdr-right { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }

  .theme-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); border-radius: var(--r-sm); padding: 8px 14px;
    cursor: pointer; font: 500 12px/1 'DM Sans',sans-serif;
    transition: border-color .15s, color .15s; white-space: nowrap; align-self: center;
  }
  .theme-btn:hover { border-color: var(--cyan); color: var(--cyan); }

  /* ─── TICKER ─── */
  .ticker-wrap {
    display: flex; gap: 8px;
  }
  .ticker {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 10px 14px; min-width: 170px;
  }
  .ticker-top {
    display: flex; align-items: center; justify-content: space-between;
    font: 600 10px/1 'DM Sans',sans-serif; color: var(--text2);
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px;
  }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; flex-shrink: 0; }
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.25;transform:scale(.75)} }
  .dot-ok   { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-err  { background: var(--red); }
  .dot-load { background: var(--amber); animation: pulse-dot 1.2s ease-in-out infinite; }
  .refresh-btn {
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 15px; padding: 0;
    transition: color .15s, transform .35s cubic-bezier(.34,1.56,.64,1); line-height: 1;
  }
  .refresh-btn:hover { color: var(--cyan); transform: rotate(180deg); }
  .ticker-price { font: 700 20px/1 'JetBrains Mono',monospace; color: var(--text); display: flex; align-items: baseline; gap: 8px; }
  .ticker-time   { font: 400 10px/1 'JetBrains Mono',monospace; color: var(--text3); }
  .ticker-source { font-size: 10px; color: var(--text3); margin-top: 3px; }
  .ticker-note   { font: 400 9.5px/1 'JetBrains Mono',monospace; color: var(--text3); margin-top: 5px; opacity: .7; }
  .ticker-load   { font: 400 11px/1 'JetBrains Mono',monospace; color: var(--text3); padding: 4px 0; }

  /* ─── CONTROLS ─── */
  .controls {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 11px 16px; margin-bottom: 12px;
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  }
  .ctrl-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ctrl-label {
    font: 600 10px/1 'DM Sans',sans-serif; color: var(--text2);
    text-transform: uppercase; letter-spacing: .08em; white-space: nowrap;
  }
  .ctrl-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

  .btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); border-radius: var(--r-sm); padding: 5px 11px;
    cursor: pointer; font: 500 12px/1 'DM Sans',sans-serif;
    transition: border-color .13s, color .13s, background .13s; white-space: nowrap;
  }
  .btn:hover { border-color: var(--text2); color: var(--text); }
  .btn.on { background: var(--cyan-dim); border-color: rgba(34,211,238,.35); color: var(--cyan); }

  /* fork-type select in controls */
  .fork-select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--r-sm); padding: 4px 8px;
    font: 500 12px/1 'JetBrains Mono',monospace; color: var(--text);
    cursor: pointer; transition: border-color .13s;
  }
  .fork-select:focus { outline: none; border-color: var(--cyan); }

  /* ─── TABLE ─── */
  .tbl-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); overflow: auto; margin-bottom: 12px;
  }
  table { border-collapse: collapse; width: 100%; }
  th {
    padding: 9px 10px; background: var(--surface2);
    font: 600 10px/1 'DM Sans',sans-serif; color: var(--text2);
    text-transform: uppercase; letter-spacing: .07em;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  th.poly-th { background: var(--poly-bg); color: var(--poly); border-bottom-color: var(--poly-border); }
  th.lay-th  { background: var(--lay-bg);  color: var(--lay);  border-bottom-color: var(--lay-border);  }
  td {
    border-bottom: 1px solid var(--border-soft);
    padding: 7px 10px; vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .1s; }
  tbody tr:hover td { background: var(--row-hover); }
  td.poly-td { background: var(--poly-bg); }
  tbody tr:hover td.poly-td { background: rgba(167,139,250,.13); }
  tr.is-lay td { background: rgba(244,114,182,.025); }
  tbody tr.is-lay:hover td { background: rgba(244,114,182,.06); }
  tr.is-lay td.poly-td { background: rgba(167,139,250,.06); }

  .num-col { text-align: right; font-family: 'JetBrains Mono',monospace; }
  .ctr-col { text-align: center; }

  input[type=number] {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--r-sm); padding: 5px 8px;
    font: 400 12.5px/1 'JetBrains Mono',monospace; color: var(--text);
    transition: border-color .15s, box-shadow .15s; -moz-appearance: textfield;
  }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number]:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(34,211,238,.08); }
  input[type=number][readonly] { background: var(--inp-ro); cursor: default; font-weight: 700; }

  select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--r-sm); padding: 4px 7px;
    font: 400 11.5px/1 'DM Sans',sans-serif; color: var(--text);
    cursor: pointer; transition: border-color .13s;
  }
  select:focus { outline: none; border-color: var(--poly); }
  select:disabled { opacity: .3; cursor: not-allowed; }

  input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; accent-color: var(--poly); }

  /* currency pill */
  .cur-btn {
    border-radius: 20px; padding: 3px 9px; font-size: 11px;
    cursor: pointer; transition: all .13s;
    background: var(--surface3); border: 1px solid var(--border);
    color: var(--text2); font-family: 'JetBrains Mono',monospace; font-weight: 600;
  }
  .cur-btn:hover { border-color: var(--cyan); color: var(--cyan); }

  /* back/lay toggle */
  .bl-btn {
    border-radius: var(--r-sm); padding: 3px 9px;
    font: 700 13px/1 'JetBrains Mono',monospace;
    cursor: pointer; transition: all .13s; border: 1px solid;
    min-width: 32px; text-align: center;
  }
  .bl-btn.back { background: var(--green-bg); border-color: var(--green-border); color: var(--green-bright); }
  .bl-btn.back:hover { background: rgba(16,185,129,.15); border-color: var(--green); }
  .bl-btn.lay  { background: var(--lay-bg);   border-color: var(--lay-border);   color: var(--lay); }
  .bl-btn.lay:hover  { background: rgba(244,114,182,.15); border-color: var(--lay); }

  /* fix button */
  .fix-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text3); font-size: 13px;
    border-radius: var(--r-xs); padding: 3px 8px; cursor: pointer; transition: all .13s;
  }
  .fix-btn:hover { border-color: var(--fix); }
  .fix-btn.fix-on { background: var(--fix-bg); border-color: var(--fix-border); color: var(--fix); }
  .stake-fixed { background: var(--fix-bg) !important; border-color: var(--fix-border) !important; color: var(--fix) !important; font-weight: 700; }

  /* liability badge */
  .liab-badge {
    font: 400 10px/1 'JetBrains Mono',monospace; color: var(--lay); margin-top: 3px;
    background: var(--lay-bg); border: 1px solid var(--lay-border);
    border-radius: var(--r-xs); padding: 2px 7px; display: inline-block;
  }

  /* tfoot */
  tfoot td {
    background: var(--tfoot-bg); border-top: 1px solid var(--border);
    border-bottom: none; padding: 9px 10px;
  }

  .pos  { color: var(--green-bright); font: 700 13px/1 'JetBrains Mono',monospace; }
  .neg  { color: var(--red);          font: 700 13px/1 'JetBrains Mono',monospace; }
  .dim  { font: 400 10px/1 'JetBrains Mono',monospace; color: var(--text3); }

  .fee-badge {
    display: inline-block; background: var(--poly-bg); border: 1px solid var(--poly-border);
    color: var(--poly); font: 600 10px/1 'JetBrains Mono',monospace;
    padding: 2px 8px; border-radius: 20px; letter-spacing: .02em;
  }

  /* ─── ACTIONS ─── */
  .actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
  .actions .btn { padding: 8px 18px; font-size: 12.5px; }
  .actions .btn.primary { background: var(--cyan-dim); border-color: rgba(34,211,238,.3); color: var(--cyan); }
  .actions .btn.primary:hover { background: rgba(34,211,238,.14); border-color: var(--cyan); }

  /* ─── ROI BADGE ─── */
  .roi-badge {
    font: 700 15px/1 'JetBrains Mono', monospace;
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text3);
    transition: all .2s;
    white-space: nowrap; align-self: center;
  }
  .roi-badge.arb  { background: var(--green-bg); border-color: var(--green-border); color: var(--green-bright); box-shadow: 0 0 14px var(--green-glow); }
  .roi-badge.noarb { background: var(--red-bg);   border-color: var(--red-border);   color: var(--red); }

  /* ─── SITE FOOTER ─── */
  .site-footer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 10px 20px;
    text-align: center;
    font: 400 12px/1 'DM Sans', sans-serif;
    color: var(--text3);
  }
  .site-footer a {
    color: var(--cyan); text-decoration: none; font-weight: 600;
    transition: opacity .15s;
  }
  .site-footer a:hover { opacity: .75; }

  .warn-bar { background: var(--amber-bg); border: 1px solid var(--amber-border); color: var(--amber); border-radius: var(--r-sm); padding: 5px 12px; font-size: 12px; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 640px) {
    .hdr-brand h1 { font-size: 24px; }
    .hdr { flex-direction: column; }
    .ticker-wrap { width: 100%; }
    .ticker { min-width: unset; flex: 1; }
    .cards { grid-template-columns: repeat(2, 1fr); }
    .controls { gap: 10px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- ── HEADER ── -->
  <div class="hdr">
    <div class="hdr-brand">
      <h1>Sure<em>bet</em></h1>
      <div class="sub">Surebet Calculator</div>
    </div>
    <div class="hdr-right">
      <div id="roi-badge" class="roi-badge" style="display:none">—</div>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀️ Light</button>
      <div class="ticker-wrap">
        <div class="ticker">
          <div class="ticker-top">
            <span><span class="dot dot-load" id="dot-brl"></span>USD/BRL</span>
            <button class="refresh-btn" onclick="fetchRates()" title="Atualizar">↺</button>
          </div>
          <div id="ticker-brl"><div class="ticker-load">Buscando…</div></div>
          <div class="ticker-note">↻ 5s</div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── CONTROLS ── -->
  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Outcomes</span>
      <div id="outcome-btns" style="display:flex;gap:5px"></div>
    </div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-group">
      <span class="ctrl-label">Type</span>
      <select class="fork-select" id="fork-type" onchange="onForkChange()"></select>
    </div>
    <div class="ctrl-sep"></div>
    <button class="btn" id="show-comm-btn" onclick="toggleShowComm()">Show commissions</button>

    <div id="brl-warn" style="display:none" class="warn-bar">⚠ BRL rows need live rate</div>
  </div>

  <!-- ── TABLE ── -->
  <div class="tbl-wrap">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
      <tfoot id="tfoot"></tfoot>
    </table>
  </div>

  <!-- ── ACTIONS ── -->
  <div class="actions">
    <button class="btn primary" onclick="shareOdds()" id="copy-btn">🔗 Share odds</button>
    <button class="btn" onclick="resetAll()">Reset all</button>
  </div>

</div>

<footer class="site-footer">made ❤️ by <a href="https://polymarket.com/?r=hgx" target="_blank" rel="noopener">nagato</a></footer>

<script>
// ====================== CONFIG ======================
const POLY_CATS = {
  "None (free)":   { feeRate: 0,     exponent: 0   },
  "Crypto":        { feeRate: 0.072, exponent: 1   },
  "Sports":        { feeRate: 0.03,  exponent: 1   },
  "Finance":       { feeRate: 0.04,  exponent: 1   },
  "Politics":      { feeRate: 0.04,  exponent: 1   },
  "Tech":          { feeRate: 0.04,  exponent: 1   },
  "Culture":       { feeRate: 0.05,  exponent: 1   },
  "Economics":     { feeRate: 0.03,  exponent: 0.5 },
  "Weather":       { feeRate: 0.025, exponent: 0.5 },
  "Other/General": { feeRate: 0.2,   exponent: 2   },
  "Mentions":      { feeRate: 0.25,  exponent: 2   },
  "Geopolitical":  { feeRate: 0,     exponent: 0   },
};
const CAT_KEYS = Object.keys(POLY_CATS);

// Fork/formula types — label, minOutcomes
const FORK_TYPES_2 = [
  { id:"1-2",   label:"1 — 2",        hint:"Home vs Away" },
  { id:"1-X2",  label:"1 — X2",       hint:"Back Home / Lay X2" },
  { id:"1X-2",  label:"1X — 2",       hint:"Lay Home / Back Away" },
  { id:"AH",    label:"AH1 — AH2",    hint:"Asian Handicap" },
  { id:"OU",    label:"Over — Under",  hint:"Goals market" },
];
const FORK_TYPES_3 = [
  { id:"1-X-2",    label:"1 — X — 2",       hint:"3-way standard" },
  { id:"3corr",    label:"3 corners",        hint:"Corners market" },
  { id:"DNB+D",    label:"DNB + Draw",       hint:"Draw No Bet + Draw" },
];
const FORK_TYPES_N = [
  { id:"multi",    label:"Multi-way",        hint:"4+ outcomes" },
];

const CURR_SYMS = { USD:"$", BRL:"R$" };

// ====================== STATE ======================
let numOut     = 2;
let showComm   = false;
let roundValue = 0;
let roundUseFx = false;
let nextId     = 3;
let rows       = [makeRow(1), makeRow(2)];
let rates      = { USD: 1, BRL: null };
let lastUpdated = null;
let result      = null;
let darkMode    = true;
let forkType    = "1-2";
let totalStakeOverride = null;

function makeRow(id) {
  return {
    id, odds:"2", comm:"0",
    betType:"back",     // "back" | "lay"
    usePoly:false, cat:"Sports",
    currency:"USD", isFixed:false, fixedStake:"",
    manualStake: null,   // user-typed override when another row is the fixed anchor
    customRate: null     // custom BRL/USD rate for display on USD rows
  };
}

// ====================== MATH ======================
/**
 * Effective odds taking commission and bet type into account.
 *
 * Back bet: eff = 1 + (raw−1)×(1 − c%)  [commission on profit only]
 * Lay  bet: eff = raw − c%               [lay formula]
 * Then apply Polymarket taker fee on top (back only).
 */
function calcEffOdds(raw, commPct, betType, usePoly, catKey) {
  if (!raw || raw <= 1) return null;
  const c = (parseFloat(commPct) || 0) / 100;
  let eff;
  if (betType === "lay") {
    eff = raw - c;                          // lay formula
  } else {
    eff = 1 + (raw - 1) * (1 - c);         // back formula
  }
  if (eff <= 1) return null;
  if (!usePoly || betType === "lay") return eff;
  const { feeRate, exponent } = POLY_CATS[catKey];
  if (!feeRate) return eff;
  const p = 1 / eff;
  const adjEff = 1 / (p * (1 + feeRate * Math.pow(p * (1 - p), exponent)));
  return adjEff > 1 ? adjEff : null;
}

function takerFeePct(raw, commPct, catKey) {
  if (raw <= 1) return 0;
  const c = (parseFloat(commPct) || 0) / 100;
  const eff = 1 + (raw - 1) * (1 - c);
  if (eff <= 1) return 0;
  const { feeRate, exponent } = POLY_CATS[catKey];
  if (!feeRate) return 0;
  const p = 1 / eff;
  return feeRate * Math.pow(p * (1 - p), exponent) * 100;
}

function f2(n) { return (typeof n==="number" && isFinite(n)) ? n.toFixed(2) : "—"; }

function toDisplay(usdAmt, currency) {
  if (currency === "USD") return usdAmt;
  if (currency === "BRL") return rates.BRL ? usdAmt * rates.BRL : null;
  return null;
}

// ====================== RATE FETCHER ======================
async function fetchRates() {
  ["dot-brl"].forEach(id => {
    document.getElementById(id).className = "dot dot-load";
  });

  const attempts = [
    async () => {
      const brlRes = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=USDCBRL",{cache:"no-store"}).then(r=>r.json());
      const brl = parseFloat(brlRes.price);
      return { brl, src:"Binance" };
    },
    async () => {
      const d = await fetch("https://open.er-api.com/v6/latest/USD").then(r=>r.json());
      return { brl: d.rates.BRL, src:"ExchangeRate-API" };
    },
    async () => {
      const d = await fetch("https://api.frankfurter.app/latest?base=USD&symbols=BRL").then(r=>r.json());
      return { brl: d.rates.BRL, src:"Frankfurter/ECB" };
    },
  ];

  for (const fn of attempts) {
    try {
      const { brl, src } = await fn();
      if (brl > 0) {
        gotRates(brl, src); return;
      }
    } catch (_) {}
  }

  // Fallback: try existing USDT/BRL
  try {
    const d = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=USDTBRL",{cache:"no-store"}).then(r=>r.json());
    const brl = parseFloat(d.price);
    if (brl > 0) { gotRates(brl, "Binance USDT"); return; }
  } catch (_) {}

  document.getElementById("ticker-brl").innerHTML = `<div style="color:var(--red);font-size:11px;font-family:'JetBrains Mono',monospace">Falha</div>`;
  ["dot-brl"].forEach(id => { document.getElementById(id).className = "dot dot-err"; });
}

function gotRates(brl, source) {
  rates.BRL = brl;
  lastUpdated = new Date();
  const t = lastUpdated.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

  document.getElementById("dot-brl").className = "dot dot-ok";
  document.getElementById("ticker-brl").innerHTML = `
    <div class="ticker-price">R$${brl.toFixed(4)}<span class="ticker-time">${t}</span></div>
    <div class="ticker-source">${source}</div>`;

  calc(); updateDisplay();
}

function buildForkSelect() {

  sel.innerHTML = types.map(t =>

    forkType = types[0].id;
    sel.value = forkType;
  }
}

function onForkChange() {
  forkType = document.getElementById("fork-type").value;
  // Auto-set back/lay for 1-X2 and 1X-2
  if (forkType === "1-X2" && rows.length >= 2) {
    rows[0].betType = "back"; rows[1].betType = "lay";
  } else if (forkType === "1X-2" && rows.length >= 2) {
    rows[0].betType = "lay"; rows[1].betType = "back";
  } else {
    // All back for other types
    rows.forEach(r => { if(forkType!=="1-X2"&&forkType!=="1X-2") r.betType="back"; });
  }
  calc(); buildTable();
}

// ====================== CALC ======================
function calc() {
  const effArr = rows.map(r =>
    calcEffOdds(parseFloat(r.odds), parseFloat(r.comm)||0, r.betType, r.usePoly, r.cat)
  );
  if (!effArr.every(o => o !== null && o > 1)) { result = null; return; }

  const invSum  = effArr.reduce((s,o) => s + 1/o, 0);
  const margin  = invSum;
  const isSurebet = margin < 1;

  const fixIdx = rows.findIndex(r => r.isFixed);
  let target;
  if (fixIdx >= 0) {
    const fRow = rows[fixIdx];
    const raw  = parseFloat(fRow.fixedStake) || 0;
    // Convert fixed stake to USD
    let usdFixed;
    if (fRow.currency === "USD") usdFixed = raw;
    else if (fRow.currency === "BRL") usdFixed = rates.BRL ? raw / rates.BRL : raw;
    else usdFixed = raw;
    target = usdFixed * effArr[fixIdx];
  } else {
    const desiredTotal = totalStakeOverride !== null ? totalStakeOverride : 100;
    target = desiredTotal / invSum;
  }

  let stakesUSD = effArr.map(o => target / o);

  // Apply manual stake overrides (rows where user typed a value while another row is the anchor)
  rows.forEach((r, i) => {
    if (r.manualStake !== null && !r.isFixed) {
      const raw = r.manualStake === "" ? null : parseFloat(r.manualStake);
      if (raw !== null && !isNaN(raw)) {
        let usdManual;
        if (r.currency === "USD") usdManual = raw;
        else if (r.currency === "BRL") usdManual = rates.BRL ? raw / rates.BRL : raw;
        else usdManual = raw;
        stakesUSD[i] = usdManual;
      }
    }
  });

  if (roundValue > 0) {
    stakesUSD = stakesUSD.map((s, i) => {
      const row = rows[i];
      if (roundUseFx && row.currency === "BRL" && rates.BRL) {
        const brl     = s * rates.BRL;
        const rounded = Math.ceil(brl / roundValue) * roundValue;
        return rounded / rates.BRL;
      }
      return Math.ceil(s / roundValue) * roundValue;
    });
  }

  const totalUSD   = stakesUSD.reduce((a,b)=>a+b,0);
  const returnsUSD = stakesUSD.map((s,i)=>s*effArr[i]);
  const profitsUSD = returnsUSD.map(r=>r-totalUSD);
  const minProfit  = Math.min(...profitsUSD);
  const roi        = totalUSD ? (minProfit / totalUSD) * 100 : 0;

  result = { margin, isSurebet, effArr, stakesUSD, totalUSD, returnsUSD, profitsUSD, minProfit, roi };
}

// ====================== TABLE ======================
function buildTable() {
  calc();

  // HEADER
  let h = `<tr>
    <th style="width:28px">#</th>
    <th class="ctr-col" style="width:50px">B/L</th>
    <th>Odds</th>
    <th class="num-col">Prob%</th>`;
  if (showComm) h += `<th>Comm %</th><th class="num-col">Eff.Odds</th>`;
  h += `
    <th class="poly-th ctr-col">Poly</th>
    <th class="poly-th">Category</th>
    <th class="poly-th num-col">Taker Fee</th>
    <th class="ctr-col">Currency</th>
    <th>Stake</th>
    <th class="ctr-col" style="width:44px">Fix</th>
    <th class="num-col">Profit</th>
  </tr>`;
  document.getElementById("thead").innerHTML = h;

  document.getElementById("tbody").innerHTML = rows.map((row, idx) => {
    const cur     = row.currency;
    const isLay   = row.betType === "lay";
    const catOpts = CAT_KEYS.map(k =>
      `<option value="${k}"${row.cat===k?" selected":""}>${k}</option>`
    ).join("");

    let commCols = "";
    if (showComm) {
      const raw = parseFloat(row.odds) || 0;
      const eff = result ? result.effArr[idx] : null;
      commCols = `
        <td><input type="number" min="-40" max="40" step="0.01" value="${row.comm}"
          style="width:70px;text-align:center"
          oninput="onCommInput(${row.id},this.value)"></td>
        <td class="num-col" id="ao-${row.id}" style="font-size:12px">
          ${eff ? `<span style="font-family:'JetBrains Mono',monospace;font-size:11px">${eff.toFixed(4)}</span>` : "—"}
        </td>`;
    }

    // Liability for lay bets
    let liabHtml = "";
    if (isLay && result) {
      const raw  = parseFloat(row.odds) || 0;
      const s    = result.stakesUSD[idx];
      const liab = s * (raw - 1);
      const liabDisp = toDisplay(liab, cur);
      liabHtml = `<div class="liab-badge" title="Your liability">Liab: ${CURR_SYMS[cur]}${f2(liabDisp??liab)}</div>`;
    }

    const stakeFixed = (row.isFixed || row.manualStake !== null) ? "stake-fixed" : "";
    const stakeVal   = row.isFixed ? row.fixedStake
      : row.manualStake !== null ? row.manualStake
      : result ? (() => {
          const v = toDisplay(result.stakesUSD[idx], cur);
          return v !== null ? f2(v) : "";
        })() : "";

    return `
    <tr class="${isLay?"is-lay":""}">
      <td class="ctr-col" style="font:600 11px/1 'JetBrains Mono',monospace;color:var(--text3)">${idx+1}</td>
      <td class="ctr-col">
        <button class="bl-btn ${isLay?"lay":"back"}" onclick="toggleBL(${row.id})" title="${isLay?"Lay (you're the bookmaker)":"Back (you're the bettor)"}">${isLay?"−":"+"}</button>
      </td>
      <td><input type="number" min="1.001" step="0.01" value="${row.odds}" style="width:88px;text-align:center"
        placeholder="${isLay?"Lay odds":"Back odds"}"
        oninput="onOddsInput(${row.id},this.value)"></td>
      <td class="num-col" id="prob-${row.id}" style="font-size:12px">
        ${(parseFloat(row.odds)||0) > 1 ? (100/(parseFloat(row.odds))).toFixed(1)+"%" : "—"}
      </td>
      ${commCols}
      <td class="poly-td ctr-col">
        <input type="checkbox" ${row.usePoly&&!isLay?"checked":""} ${isLay?"disabled":""} onchange="onPolyChange(${row.id},this.checked)" title="${isLay?"Polymarket only for back bets":"Use Polymarket taker fee"}">
      </td>
      <td class="poly-td">
        <select id="catsel-${row.id}" ${(row.usePoly&&!isLay)?"":"disabled"} onchange="onCatChange(${row.id},this.value)">${catOpts}</select>
      </td>
      <td id="fee-${row.id}" class="poly-td num-col">
        ${(!isLay && row.usePoly) ? (() => {
          const fp = takerFeePct(parseFloat(row.odds)||0, parseFloat(row.comm)||0, row.cat);
          return fp > 0 ? `<span class="fee-badge">${fp.toFixed(3)}%</span>` : `<span style="color:var(--text3)">—</span>`;
        })() : `<span style="color:var(--text3)">—</span>`}
      </td>
      <td class="ctr-col">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
          <button class="cur-btn" id="curbtn-${row.id}" onclick="cycleCur(${row.id})">${cur==="USD"?"$ USD":"R$ BRL"}</button>
          ${cur==="USD" ? `<div style="display:flex;align-items:center;gap:3px">
            <span style="font:400 9px/1 'JetBrains Mono',monospace;color:var(--text3)">R$/&dollar;</span>
            <input type="number" min="0.01" step="0.01"
              style="width:64px;font-size:11px;padding:3px 5px;text-align:right"
              placeholder="${rates.BRL ? rates.BRL.toFixed(2) : 'rate'}"
              value="${row.customRate !== null ? row.customRate : ''}"
              oninput="onCustomRate(${row.id},this.value)"
              title="Cotação USD/BRL personalizada para esta linha">
          </div>` : ""}
        </div>
      </td>
      <td>
        <div style="display:flex;flex-direction:column;gap:3px">
          <div style="display:flex;align-items:center;gap:4px">
            <span id="cursym-${row.id}" style="font:400 11px/1 'JetBrains Mono',monospace;color:var(--text3)">${CURR_SYMS[cur]}</span>
            <input type="number" id="stake-${row.id}" class="${stakeFixed}" style="width:92px;text-align:right"
              oninput="onStakeInput(${row.id},this.value)"
              value="${stakeVal}"
              placeholder="${isLay?"Backer stake":"Your stake"}">
          </div>
          ${liabHtml}
          <div id="brl-hint-${row.id}" class="dim" style="padding-left:2px;display:none"></div>
        </div>
      </td>
      <td class="ctr-col" id="fixcell-${row.id}">
        <button class="fix-btn ${row.isFixed?"fix-on":"fix-off"}" onclick="toggleFix(${row.id})"
          title="${row.isFixed?"Unfix stake":"Fix this stake"}">${row.isFixed?"🔒":"🔓"}</button>
      </td>
      <td id="profit-${row.id}" class="num-col">—</td>
    </tr>`;
  }).join("");

  updateDisplay();
}

function updateDisplay() {
  const roiBadge = document.getElementById("roi-badge");
  if (!result) {
    document.getElementById("tfoot").innerHTML = "";
    if (roiBadge) { roiBadge.style.display = "none"; }
    return;
  }

  rows.forEach((row, i) => {
    // Prob cell update
    const probEl = document.getElementById(`prob-${row.id}`);
    if (probEl) {
      probEl.innerHTML = (parseFloat(row.odds)||0) > 1 ? (100/(parseFloat(row.odds))).toFixed(1)+"%" : "—";
    }

    // Fee cell update
    const feeEl = document.getElementById(`fee-${row.id}`);
    if (feeEl) {
      const isLay = row.betType === "lay";
      if (!isLay && row.usePoly) {
        const fp = takerFeePct(parseFloat(row.odds)||0, parseFloat(row.comm)||0, row.cat);
        feeEl.innerHTML = fp > 0 ? `<span class="fee-badge">${fp.toFixed(3)}%</span>` : `<span style="color:var(--text3)">—</span>`;
      } else {
        feeEl.innerHTML = `<span style="color:var(--text3)">—</span>`;
      }
    }

    // Profit cell
    const profEl = document.getElementById(`profit-${row.id}`);
    if (profEl) {
      const pUSD = result.profitsUSD[i];
      const disp = toDisplay(pUSD, row.currency);
      const sign = pUSD >= 0 ? "+" : "";
      const cls  = pUSD >= -0.005 ? "pos" : "neg";
      const sym  = CURR_SYMS[row.currency];
      const main = disp !== null ? `${sign}${sym}${Math.abs(disp).toFixed(2)}` : `${sign}$${Math.abs(pUSD).toFixed(2)}`;
      const sub  = row.currency !== "USD" && disp !== null ? `<div class="dim">${sign}$${f2(Math.abs(pUSD))}</div>` : "";
      profEl.innerHTML = `<span class="${cls}">${main}</span>${sub}`;
    }

    // Stake
    const stakeEl = document.getElementById(`stake-${row.id}`);
    if (stakeEl && !row.isFixed && row.manualStake === null && document.activeElement !== stakeEl) {
      const v = toDisplay(result.stakesUSD[i], row.currency);
      stakeEl.value = v !== null ? f2(v) : "";
    }

    // BRL hint for USD rows with customRate (or show with live rate when filled)
    const brlHint = document.getElementById(`brl-hint-${row.id}`);
    if (brlHint && row.currency === "USD") {
      const activeRate = row.customRate || null;
      if (activeRate) {
        const usdAmt = result.stakesUSD[i];
        brlHint.textContent = `≈ R$${f2(usdAmt * activeRate)}`;
        brlHint.style.display = "";
      } else {
        brlHint.style.display = "none";
      }
    } else if (brlHint) {
      brlHint.style.display = "none";
    }

    // Liability update (for lay rows)
    if (row.betType === "lay") {
      const raw  = parseFloat(row.odds) || 0;
      const s    = result.stakesUSD[i];
      const liab = s * (raw - 1);
      const liabDisp = toDisplay(liab, row.currency);
      const sym  = CURR_SYMS[row.currency];
      // find existing liab-badge
      const cell = document.getElementById(`stake-${row.id}`)?.closest("td");
      if (cell) {
        let badge = cell.querySelector(".liab-badge");
        if (!badge) {
          badge = document.createElement("div");
          badge.className = "liab-badge";
          cell.querySelector("div").appendChild(badge);
        }
        badge.textContent = `Liab: ${sym}${f2(liabDisp??liab)}`;
      }
    }
  });

  // Total stake input sync (don't override while user is editing)
  const totalInput = document.getElementById("total-stake-input");
  if (totalInput && document.activeElement !== totalInput) {
    totalInput.value = f2(result.totalUSD);
  }

  // FOOTER
  // Cols: # B/L Odds Prob% [Comm% Eff.Odds] Poly Cat Fee Currency Stake Fix Profit
  const colCount = 11 + (showComm ? 2 : 0);
  const colsBeforeStake = colCount - 3; // exclude Stake, Fix, Profit
  const totalInputActive = document.activeElement?.id === "total-stake-input";

  if (!totalInputActive) {
    document.getElementById("tfoot").innerHTML = `
      <tr>
        <td colspan="${colsBeforeStake}" style="text-align:right;color:var(--text2);font:500 12px/1 'DM Sans',sans-serif">
          Total stake (USD):</td>
        <td>
          <div style="display:flex;align-items:center;gap:4px">
            <span style="color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px">$</span>
            <input type="number" id="total-stake-input" min="0.01" step="0.01"
              value="${f2(result.totalUSD)}"
              style="width:92px;text-align:right;font-weight:700"
              title="Edite para distribuir o total entre as apostas"
              oninput="onTotalStakeInput(this.value)">
          </div>
        </td>
        <td></td>
        <td class="num-col" id="tfoot-profit">
          <span class="${result.minProfit>=0?"pos":"neg"}">${result.minProfit>=0?"+":""}\$${f2(Math.abs(result.minProfit))}</span>
          ${rates.BRL?`<div class="dim">R$${f2(result.minProfit*rates.BRL)}</div>`:""}
        </td>
      </tr>`;
  } else {
    // Only update the profit cell without touching the focused input
    const profitCell = document.getElementById("tfoot-profit");
    if (profitCell) {
      profitCell.innerHTML = `
        <span class="${result.minProfit>=0?"pos":"neg"}">${result.minProfit>=0?"+":""}\$${f2(Math.abs(result.minProfit))}</span>
        ${rates.BRL?`<div class="dim">R$${f2(result.minProfit*rates.BRL)}</div>`:""}`;
    }
  }

  // ROI BADGE (top-right)
  if (roiBadge) {
    roiBadge.style.display = "";
    roiBadge.textContent = result.roi.toFixed(2) + "%";
    roiBadge.className = "roi-badge " + (result.isSurebet ? "arb" : "noarb");
  }

  document.getElementById("brl-warn").style.display =
    (rows.some(r=>r.currency==="BRL") && !rates.BRL) ? "" : "none";
}

// ====================== HANDLERS ======================
function onOddsInput(id, val)  { rows.find(r=>r.id===id).odds = val; calc(); updateDisplay(); }
function onCommInput(id, val)  { rows.find(r=>r.id===id).comm = val; calc(); updateDisplay(); }
function onPolyChange(id, checked) {
  const row = rows.find(r=>r.id===id);
  row.usePoly = checked;
  const sel = document.getElementById(`catsel-${id}`);
  if (sel) sel.disabled = !checked;
  calc(); buildTable();
}
function onCatChange(id, val) { rows.find(r=>r.id===id).cat = val; calc(); updateDisplay(); }

function onStakeInput(id, val) {
  const row = rows.find(r=>r.id===id);
  totalStakeOverride = null;

  if (row.isFixed) {
    // Row already explicitly fixed — update the anchor value
    row.fixedStake = val;
  } else {
    // Never auto-fix on typing; store as manual override only
    row.manualStake = (val === "" || val === null) ? null : val;
  }
  calc(); updateDisplay();
}

function toggleBL(id) {
  const row = rows.find(r=>r.id===id);
  row.betType = row.betType === "back" ? "lay" : "back";
  if (row.betType === "lay") { row.usePoly = false; } // poly only for back
  calc(); buildTable();
}

function cycleCur(id) {
  const row = rows.find(r=>r.id===id);
  const order = ["USD","BRL"];
  const next  = order[(order.indexOf(row.currency)+1) % order.length];
  row.customRate = null; // reset custom rate on currency change
  if (row.isFixed && row.fixedStake) {
    // convert fixed stake to new currency
    const usd = toUSD(parseFloat(row.fixedStake), row.currency);
    row.fixedStake = f2(fromUSD(usd, next) ?? usd);
  }
  if (row.manualStake !== null && row.manualStake !== "") {
    const usd = toUSD(parseFloat(row.manualStake), row.currency);
    row.manualStake = f2(fromUSD(usd, next) ?? usd);
  }
  row.currency = next;
  calc(); buildTable();
}

function toUSD(amt, cur) {
  if (cur==="USD") return amt;
  if (cur==="BRL") return rates.BRL ? amt / rates.BRL : amt;
  return amt;
}
function fromUSD(usd, cur) {
  if (cur==="USD") return usd;
  if (cur==="BRL") return rates.BRL ? usd * rates.BRL : null;
  return null;
}

function toggleFix(id) {
  const row = rows.find(r=>r.id===id);
  if (row.isFixed) {
    row.isFixed = false; row.fixedStake = "";
  } else {
    rows.forEach(r => { r.isFixed = false; r.fixedStake = ""; r.manualStake = null; });
    totalStakeOverride = null;
    row.isFixed = true;
    // Prefer: already-typed manual stake → current DOM input value → calc result
    const stakeEl = document.getElementById(`stake-${id}`);
    const typedVal = row.manualStake !== null && row.manualStake !== ""
      ? row.manualStake
      : (stakeEl && stakeEl.value !== "" ? stakeEl.value : null);
    if (typedVal !== null) {
      row.fixedStake = typedVal;
    } else {
      const idx  = rows.indexOf(row);
      const usd  = result ? result.stakesUSD[idx] : 0;
      const disp = fromUSD(usd, row.currency);
      row.fixedStake = f2(disp ?? usd);
    }
    row.manualStake = null;
  }
  calc(); buildTable();
}

function onCustomRate(id, val) {
  const row = rows.find(r=>r.id===id);
  row.customRate = (val === "" || val === null) ? null : parseFloat(val) || null;
  updateDisplay();
}

function onTotalStakeInput(val) {
  const parsed = parseFloat(val);
  if (!isNaN(parsed) && parsed > 0) {
    totalStakeOverride = parsed;
    rows.forEach(r => { r.isFixed = false; r.fixedStake = ""; r.manualStake = null; });
    calc(); updateDisplay();
  } else if (val === "" || val === null) {
    totalStakeOverride = null;
    calc(); updateDisplay();
  }
}

// ====================== UTILITIES ======================
// ====================== SHARE ODDS ======================
function shareOdds() {
  if (!rows.some(r => r.odds)) return alert("Enter odds first.");
  const params = new URLSearchParams();
  params.set("n", numOut);
  params.set("ft", forkType);
  rows.forEach((r, i) => {
    params.set(`o${i}`, r.odds);
    params.set(`c${i}`, r.comm);
    params.set(`bt${i}`, r.betType);
    params.set(`poly${i}`, r.usePoly ? "1" : "0");
    params.set(`cat${i}`, r.cat);
    params.set(`cur${i}`, r.currency);
    params.set(`fx${i}`, r.isFixed ? "1" : "0");
    if (r.isFixed && r.fixedStake) params.set(`fxs${i}`, r.fixedStake);
    if (r.customRate !== null) params.set(`cr${i}`, r.customRate);
  });
  const url = `${location.origin}${location.pathname}?${params.toString()}`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById("copy-btn");
    const orig = btn.textContent;
    btn.textContent = "✅ Link copied!";
    setTimeout(() => btn.textContent = orig, 2000);
  }).catch(() => {
    prompt("Copy this link:", url);
  });
}

function loadFromURL() {
  const params = new URLSearchParams(location.search);
  if (!params.has("n")) return;
  const n = parseInt(params.get("n")) || 2;
  numOut = n;
  forkType = params.get("ft") || "1-2";
  rows = [];
  for (let i = 0; i < n; i++) {
    const r = makeRow(i + 1);
    r.odds    = params.get(`o${i}`)   || "";
    r.comm    = params.get(`c${i}`)   || "0";
    r.betType = params.get(`bt${i}`)  || "back";
    r.usePoly = params.get(`poly${i}`) === "1";
    r.cat     = params.get(`cat${i}`) || "Sports";
    r.currency= params.get(`cur${i}`) || "USD";
    r.isFixed = params.get(`fx${i}`) === "1";
    r.fixedStake = r.isFixed ? (params.get(`fxs${i}`) || "") : "";
    r.customRate = params.has(`cr${i}`) ? parseFloat(params.get(`cr${i}`)) || null : null;
    rows.push(r);
  }
  nextId = n + 1;
  document.querySelectorAll("#outcome-btns button").forEach(b =>
    b.classList.toggle("on", parseInt(b.textContent) === n)
  );
  buildForkSelect();
  document.getElementById("fork-type").value = forkType;
  calc(); buildTable();
}

function resetAll() {
  numOut = 2; forkType = "1-2";
  rows = [makeRow(1), makeRow(2)];
  nextId = 3; roundValue = 0; roundUseFx = false; totalStakeOverride = null;
  document.querySelectorAll("#outcome-btns button").forEach(b => b.classList.toggle("on", b.textContent==="2"));
  buildForkSelect();
  showComm = false;
  document.getElementById("show-comm-btn").textContent = "Show commissions";
  document.getElementById("show-comm-btn").classList.remove("on");
  calc(); buildTable();
}

// ====================== INIT ======================
setInterval(fetchRates, 5000);
fetchRates();
loadFromURL();
buildTable();

// button initial states — show-comm is OFF by default
document.getElementById("show-comm-btn").textContent = "Show commissions";
document.getElementById("show-comm-btn").classList.remove("on");

// theme persistence
const storedTheme = localStorage.getItem("darkMode");
if (storedTheme !== null) { darkMode = storedTheme === "true"; }
document.body.classList.toggle("light", !darkMode);
document.getElementById("theme-btn").textContent = darkMode ? "☀️ Light" : "🌙 Dark";
</script>
